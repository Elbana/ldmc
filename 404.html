<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – LDMC</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    .error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;background:var(--beige);}
    .error-code{font-size:8rem;font-weight:700;line-height:1;color:var(--gold);font-family:var(--font-heading);}
    .error-title{font-size:2rem;margin:1rem 0;font-family:var(--font-heading);}
    .error-text{color:var(--charcoal);max-width:480px;margin:0 auto 2rem;}
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-text">The page you are looking for doesn't exist or has been moved. Let us guide you back.</p>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
        <a href="/en/" class="btn btn-primary">Back to Home</a>
        <a href="/en/products.html" class="btn btn-outline">View Products</a>
      </div>
    </div>
  </div>
  <script src="/assets/js/main.js"></script>
</body>
</html>
