<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Down for Maintenance</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 3rem 4rem;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      max-width: 480px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 1rem; color: #222; }
    p  { line-height: 1.7; color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <h1>We'll be back soon</h1>
    <p>Our website is currently undergoing scheduled maintenance.<br>Please check back later.</p>
  </div>
</body>
</html>
